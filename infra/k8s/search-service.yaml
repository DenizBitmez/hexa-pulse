apiVersion: apps/v1
kind: Deployment
metadata:
  name: search-service
  namespace: sentinel-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: search-service
  template:
    metadata:
      labels:
        app: search-service
    spec:
      containers:
      - name: search-service
        image: search-service:latest
        ports:
        - containerPort: 8080
        env:
        - name: SPRING_ELASTICSEARCH_URIS
          value: "http://elasticsearch:9200"
        - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
          value: "kafka:9092"
---
apiVersion: v1
kind: Service
metadata:
  name: search-service
  namespace: sentinel-dev
spec:
  selector:
    app: search-service
  ports:
  - protocol: TCP
    port: 8080
    targetPort: 8080
