apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: sentinel-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
      - name: auth-service
        image: auth-service:latest
        ports:
        - containerPort: 8080
        env:
        - name: SPRING_DATA_REDIS_HOST
          value: "redis"
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: sentinel-dev
spec:
  selector:
    app: auth-service
  ports:
  - protocol: TCP
    port: 8080
    targetPort: 8080
