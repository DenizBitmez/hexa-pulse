spring:
  application:
    name: auth-service
  data:
    redis:
      host: localhost
      port: 6379

jwt:
  secret: your-very-secure-and-long-secret-key-that-is-at-least-32-characters
  expiration: 3600000

management:
  endpoints:
    web:
      exposure:
        include: prometheus,health,info
  endpoint:
    prometheus:
      enabled: true
    health:
      show-details: always
